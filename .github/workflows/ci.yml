name: Maestro CI

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:
  run-evals:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Maestro Evaluations
        env:
          EVAL_API_URL: ${{ secrets.EVAL_API_URL }}
        run: |
          node evals/run_evals.js
